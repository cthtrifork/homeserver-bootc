name: Cleanup Pull Request Images
on:
  pull_request:
    types:
      - closed
jobs:
  ghcr-cleanup-image:
    name: ghcr cleanup action
    runs-on: ubuntu-latest
    concurrency:
      group: cleanup-images
    permissions:
      actions: write
    steps:
      - name: Delete image
        uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86 # v1.1.0
        with:
          delete-tags: pr-${{github.event.pull_request.number}}
          packages: homeserver-bootc/homeserver-centos-bootc,homeserver-bootc/homeserver-gui-bootc

      - name: Delete Untagged Images
        uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86 # v1.1.0
