# Define several plugins in a single file in the K9s root configuration
# $XDG_CONFIG_HOME/k9s/plugins.yaml
plugins:
  secret-openssl-ca:
    shortCut: Ctrl-O
    confirm: false
    description: Openssl ca.crt
    scopes:
      - secrets
    command: bash
    background: false
    args:
      - -c
      - kubectl get secret --context $CONTEXT -n $NAMESPACE $NAME -o jsonpath='{.data.ca\.crt}' | base64 -d | openssl storeutl -noout -text -certs /dev/stdin |& less

  secret-openssl-tls:
    shortCut: Shift-O
    confirm: false
    description: Openssl tls.crt
    scopes:
      - secrets
    command: bash
    background: false
    args:
      - -c
      - kubectl get secret --context $CONTEXT -n $NAMESPACE $NAME -o jsonpath='{.data.tls\.crt}' | base64 -d | openssl storeutl -noout -text -certs /dev/stdin |& less

  refresh-external-secrets:
    shortCut: Shift-E
    confirm: false
    scopes:
      - externalsecrets
    description: Refresh the externalsecret
    command: bash
    background: true
    args:
      - -c
      - "kubectl annotate externalsecrets.external-secrets.io --context $CONTEXT -n $NAMESPACE $NAME force-sync=$(date +%s) --overwrite"

  refresh-push-secrets:
    shortCut: Shift-P
    confirm: false
    scopes:
      - pushsecrets
    description: Refresh the pushsecret
    command: bash
    background: true
    args:
      - -c
      - "kubectl annotate pushsecrets.external-secrets.io --context $CONTEXT -n $NAMESPACE $NAME force-sync=$(date +%s) --overwrite"

  toggle-helmrelease:
    shortCut: Shift-H
    confirm: true
    scopes:
      - helmreleases
    description: Toggle to suspend or resume a HelmRelease
    command: bash
    background: false
    args:
      - -c
      - >-
        suspended=$(kubectl --context $CONTEXT get helmreleases -n $NAMESPACE $NAME -o=custom-columns=TYPE:.spec.suspend | tail -1);
        verb=$([ "$suspended" = "true" ] && echo "resume" || echo "suspend");
        flux
        $verb helmrelease
        --context $CONTEXT
        -n $NAMESPACE $NAME
        | less -K

  toggle-kustomization:
    shortCut: Shift-K
    confirm: true
    scopes:
      - kustomizations
    description: Toggle to suspend or resume a Kustomization
    command: bash
    background: false
    args:
      - -c
      - >-
        suspended=$(kubectl --context $CONTEXT get kustomizations -n $NAMESPACE $NAME -o=custom-columns=TYPE:.spec.suspend | tail -1);
        verb=$([ "$suspended" = "true" ] && echo "resume" || echo "suspend");
        flux
        $verb kustomization
        --context $CONTEXT
        -n $NAMESPACE $NAME
        | less -K

  reconcile-git:
    shortCut: Shift-G
    confirm: false
    description: Flux reconcile git source
    scopes:
      - gitrepositories
    command: bash
    background: false
    args:
      - -c
      - >-
        flux
        reconcile source git
        --context $CONTEXT
        -n $NAMESPACE $NAME
        | less -K

  reconcile-hr:
    shortCut: Shift-R
    confirm: false
    description: Flux reconcile helmrelease
    scopes:
      - helmreleases
    command: bash
    background: false
    args:
      - -c
      - >-
        flux
        reconcile helmrelease
        --context $CONTEXT
        -n $NAMESPACE $NAME
        | less -K

  reconcile-helm-repo:
    shortCut: Shift-L
    description: Flux reconcile helm source
    scopes:
      - helmrepositories
    command: bash
    background: false
    confirm: false
    args:
      - -c
      - >-
        flux
        reconcile source helm
        --context $CONTEXT
        -n $NAMESPACE $NAME
        | less -K

  reconcile-oci-repo:
    shortCut: Shift-C
    description: Flux reconcile oci source
    scopes:
      - ocirepositories
    command: bash
    background: false
    confirm: false
    args:
      - -c
      - >-
        flux
        reconcile source oci
        --context $CONTEXT
        -n $NAMESPACE $NAME
        | less -K

  reconcile-ks:
    shortCut: Shift-Y
    confirm: false
    description: Flux reconcile kustomization
    scopes:
      - kustomizations
    command: bash
    background: false
    args:
      - -c
      - >-
        flux
        reconcile kustomization
        --context $CONTEXT
        -n $NAMESPACE $NAME
        | less -K

  reconcile-ir:
    shortCut: Shift-I
    confirm: false
    description: Flux reconcile image repository
    scopes:
      - imagerepositories
    command: sh
    background: false
    args:
      - -c
      - >-
        flux
        reconcile image repository
        --context $CONTEXT
        -n $NAMESPACE $NAME
        | less -K

  reconcile-iua:
    shortCut: Shift-A
    confirm: false
    description: Flux reconcile image update
    scopes:
      - imageupdateautomations
    command: sh
    background: false
    args:
      - -c
      - >-
        flux
        reconcile image update
        --context $CONTEXT
        -n $NAMESPACE $NAME
        | less -K

  toggle-rset:
    shortCut: Shift-U
    confirm: false
    scopes:
      - resourcesets
    description: Toggle to suspend or resume a ResourceSet
    command: bash
    background: false
    args:
      - -c
      - >-
        reconcile=$(kubectl --context $CONTEXT get resourceset -n $NAMESPACE $NAME -o=custom-columns='TYPE:.metadata.annotations.fluxcd\.controlplane\.io/reconcile' | tail -1);
        verb=$([ "$reconcile" = "disabled" ] && echo "resume" || echo "suspend");
        flux-operator
        $verb rset
        --kube-context $CONTEXT
        -n $NAMESPACE $NAME
        | less -K

  toggle-inputprovider:
    shortCut: Shift-N
    confirm: false
    scopes:
      - resourcesetinputprovider
    description: Toggle to suspend or resume an InputProvider
    command: bash
    background: false
    args:
      - -c
      - >-
        reconcile=$(kubectl --context $CONTEXT get resourcesetinputprovider -n $NAMESPACE $NAME -o=custom-columns='TYPE:.metadata.annotations.fluxcd\.controlplane\.io/reconcile' | tail -1);
        verb=$([ "$reconcile" = "disabled" ] && echo "resume" || echo "suspend");
        flux-operator
        $verb inputprovider
        --kube-context $CONTEXT
        -n $NAMESPACE $NAME
        | less -K

  reconcile-rset:
    shortCut: Shift-J
    confirm: false
    description: Flux reconcile ResourceSet
    scopes:
      - resourcesets
    command: bash
    background: false
    args:
      - -c
      - >-
        flux-operator
        reconcile rset
        --kube-context $CONTEXT
        -n $NAMESPACE $NAME
        | less -K

  reconcile-inputprovider:
    shortCut: Shift-V
    confirm: false
    description: Flux reconcile InputProvider
    scopes:
      - resources
    command: bash
    background: false
    args:
      - -c
      - >-
        flux-operator
        reconcile inputprovider
        --kube-context $CONTEXT
        -n $NAMESPACE $NAME
        | less -K

